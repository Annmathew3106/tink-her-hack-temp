<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Doubts</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="doubts.css">
</head>
<body>

<div class="layout">

    <div class="top-right-option">
        <a href="doubtcreate.html">CREATE</a>
    </div>

    <div class="sidebar">
        <h2 class="logo">CampusConnect</h2>
        <ul class="nav-links">
            <li><a href="index.html">Dashboard</a></li>
            <li><a href="lost.html">Lost & Found</a></li>
            <li><a href="notice.html">Notices & Announcements</a></li>
            <li><a href="doubts.html" class="active">Doubts</a></li>
        </ul>
    </div>

<main class="main-content">
    <h1>Doubts</h1>
    <p class="tagline">Ask freely and help the community grow.</p>
    <p class="intro">Your doubt might be someone else’s too.</p>

    <div class="posts-container" id="postsContainer">

        <!-- DEFAULT POST WITH IMAGE -->
        <div class="post-box">
            <div class="post-header">
                <span class="post-name">Admin</span>
                <span class="post-year">1st year</span> —
                <span class="post-branch">CS</span>
                <span class="post-date">2026-01-01</span>
            </div>

            <div class="post-content">
                <p class="post-text">
                    Welcome to the Doubts section! Start asking questions.
                </p>

                <img class="post-image"
                src="https://img.freepik.com/free-vector/online-education-concept-illustration_114360-5946.jpg"
                alt="Welcome Image">
            </div>
        </div>

    </div>
</main>

</div>

<script>
window.onload = function() {

    const postsContainer = document.getElementById("postsContainer");
    let doubts = JSON.parse(localStorage.getItem("doubts")) || [];

    doubts.forEach(function(d) {

        const post = document.createElement("div");
        post.classList.add("post-box");

        let imagePart = "";
        if(d.image){
            imagePart = `<img class="post-image" src="${d.image}" alt="Uploaded Image">`;
        }

        post.innerHTML = `
            <div class="post-header">
                <span class="post-name">${d.name}</span>
                <span class="post-year">${d.year}</span> —
                <span class="post-branch">${d.branch}</span>
                <span class="post-date">${d.date}</span>
            </div>
            <div class="post-content">
                <p class="post-text">${d.doubt}</p>
                ${imagePart}
            </div>
        `;

        postsContainer.appendChild(post);
    });

};
</script>

</body>
</html>
