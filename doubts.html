<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Doubts</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="home.css">
<link rel="stylesheet" href="doubts.css">
<style>
/* Comment Icon & Count */
.comment-icon {
    cursor: pointer;
    font-size: 1.2rem;
    color: #bbb;
    display: flex;
    align-items: center;
    gap: 5px;
    margin-left: 10px;
}
.comment-icon:hover { color: #5D3C64; }

/* Post like */
.post-actions { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
.post-like { cursor: pointer; font-weight: bold; color: #bbb; transition: 0.2s; }
.post-like.liked { color: #e74c3c; }

/* Modal overlay */
.modal {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; z-index: 2000;
}

/* Comments box */
.comments-modal {
    background: #fff;
    width: 400px; max-width: 90%;
    max-height: 70%;
    border-radius: 12px;
    padding: 15px 20px;
    overflow-y: auto;
    position: relative;
}

/* Close button inside comments box */
.comments-modal .close-btn {
    position: absolute;
    top: 8px;
    right: 12px;
    font-size: 22px;
    font-weight: bold;
    cursor: pointer;
    color: #9F6496;
}
.comments-modal .close-btn:hover { color: #7B466A; }

/* Comment & reply */
.comment-item, .reply-item {
    background: #f3edf5;
    border-radius: 6px;
    padding: 6px 8px;
    margin-bottom: 6px;
    display: flex; flex-direction: column;
    word-wrap: break-word;
}
.reply-item { margin-left: 20px; }
.comment-actions, .reply-actions { display: flex; gap: 10px; margin-top: 4px; font-size: 0.85rem; }
.comment-like, .reply-like, .reply-btn { cursor: pointer; color: #bbb; font-weight: bold; transition: 0.2s; }
.comment-like.liked, .reply-like.liked { color: #e74c3c; }
.reply-btn { color: #5D3C64; }

/* Comment input */
.comment-input { display: flex; gap: 8px; margin-top: 10px; }
.comment-input textarea {
    flex: 1; resize: none; padding: 6px 8px; border-radius: 6px;
    border: 1px solid #D4CBD3; font-family: inherit; font-size: 0.85rem;
}
.comment-input button {
    padding: 6px 12px; border-radius: 6px; border: none;
    background: #9F6496; color: white; cursor: pointer;
}
.comment-input button:hover { background: #7B466A; }

/* Post enlarge modal */
.modal-content {
    background: #fff;
    border-radius: 12px;
    padding: 20px;
    max-width: 500px;
    width: 90%;
    position: relative;
}
.modal-content .close-btn {
    position: absolute;
    top: 10px;
    right: 12px;
    font-size: 22px;
    font-weight: bold;
    cursor: pointer;
    color: #9F6496;
}
.modal-content .close-btn:hover { color: #7B466A; }
.modal-content img { max-width: 100%; border-radius: 8px; margin-top: 10px; }
</style>
</head>
<body>
<div class="layout">

<div class="top-right-option"><a href="doubtcreate.html">CREATE</a></div>

<div class="sidebar">
<h2 class="logo">CampusConnect</h2>
<ul class="nav-links">
<li><a href="index.html">Dashboard</a></li>
<li><a href="lost.html">Lost & Found</a></li>
<li><a href="notice.html">Notices & Announcements</a></li>
<li><a href="doubts.html" class="active">Doubts</a></li>
</ul>
</div>

<main class="main-content">
<h1>Doubts</h1>
<p class="tagline">Ask freely and help the community grow.</p>
<p class="intro">Your doubt might be someone else’s too.</p>
<div class="posts-container" id="postsContainer"></div>
</main>
</div>

<script>
// Clear old data only on first load
if(!localStorage.getItem("doubts")) localStorage.removeItem("doubts");

window.onload = function(){
const postsContainer = document.getElementById("postsContainer");
let doubts = JSON.parse(localStorage.getItem("doubts")) || [];

// Default post
if(doubts.length===0){
    doubts = [{
        name:"Admin",
        year:"1st year",
        branch:"CS",
        doubt:"💬 Got an answer? Share it here and help a fellow student! 😊",
        image:"https://img.freepik.com/free-vector/online-education-concept-illustration_114360-5946.jpg",
        comments:[], likes:0, liked:false
    }];
    localStorage.setItem("doubts", JSON.stringify(doubts));
}

function saveData(){ localStorage.setItem("doubts", JSON.stringify(doubts)); }

function renderComments(doubt, modal){
    const container = modal.querySelector(".comments-container");
    container.innerHTML = ""; 
    doubt.comments.forEach((c,ci)=>{
        if(!c.text) return;
        const commentDiv = document.createElement("div");
        commentDiv.classList.add("comment-item");
        commentDiv.innerHTML=`${c.text}<div class="comment-actions"><span class="comment-like ${c.liked?'liked':''}">&#10084;</span> <span class="reply-btn">Reply</span></div>`;
        container.appendChild(commentDiv);

        const heart = commentDiv.querySelector(".comment-like");
        const replyBtn = commentDiv.querySelector(".reply-btn");

        heart.addEventListener("click", e=>{
            e.stopPropagation();
            c.liked = !c.liked;
            heart.classList.toggle("liked", c.liked);
            saveData();
        });

        replyBtn.addEventListener("click", e=>{
            e.stopPropagation();
            const rtxt = prompt("Write reply:");
            if(!rtxt) return;
            if(!c.replies) c.replies=[];
            const rObj={text:rtxt, liked:false};
            c.replies.push(rObj);
            saveData();

            const rDiv = document.createElement("div");
            rDiv.classList.add("reply-item");
            rDiv.innerHTML=`${rObj.text}<div class="reply-actions"><span class="reply-like">&#10084;</span></div>`;
            commentDiv.appendChild(rDiv);

            const rHeart = rDiv.querySelector(".reply-like");
            rHeart.addEventListener("click", e=>{
                e.stopPropagation();
                rObj.liked=!rObj.liked;
                rHeart.classList.toggle("liked", rObj.liked);
                saveData();
            });
        });

        if(c.replies && c.replies.length>0){
            c.replies.forEach(r=>{
                if(!r.text) return;
                const rDiv = document.createElement("div");
                rDiv.classList.add("reply-item");
                rDiv.innerHTML=`${r.text}<div class="reply-actions"><span class="reply-like ${r.liked?'liked':''}">&#10084;</span></div>`;
                commentDiv.appendChild(rDiv);
                const rHeart = rDiv.querySelector(".reply-like");
                rHeart.addEventListener("click", e=>{
                    e.stopPropagation();
                    r.liked=!r.liked;
                    rHeart.classList.toggle("liked", r.liked);
                    saveData();
                });
            });
        }
    });
}

doubts.forEach((d,index)=>{
    const post = document.createElement("div");
    post.classList.add("post-box");
    let imagePart = d.image ? `<img class="post-image" src="${d.image}" alt="Image">` : "";

    post.innerHTML = `
        <div class="post-header">
            <span class="post-name">${d.name}</span>
            <span class="post-year">${d.year}</span> —
            <span class="post-branch">${d.branch}</span>
        </div>
        <div class="post-content">
            <p class="post-text">${d.doubt}</p>
            ${imagePart}
        </div>
        <div class="post-actions">
            <span class="post-like ${d.liked?'liked':''}">&#10084; ${d.likes||0}</span>
            <span class="comment-icon">&#128172; <span class="comment-count">${d.comments?d.comments.length:0}</span></span>
        </div>
    `;

    const postLike = post.querySelector(".post-like");
    const commentIcon = post.querySelector(".comment-icon");
    const commentCountSpan = post.querySelector(".comment-count");

    function updateCommentCount(){ commentCountSpan.textContent = d.comments ? d.comments.length : 0; }

    postLike.addEventListener("click", e=>{
        e.stopPropagation();
        d.liked = !d.liked;
        d.likes = d.liked ? (d.likes||0)+1 : (d.likes||0)-1;
        postLike.classList.toggle("liked", d.liked);
        postLike.innerHTML = `&#10084; ${d.likes}`;
        saveData();
    });

    commentIcon.addEventListener("click", e=>{
        e.stopPropagation();
        const modal = document.createElement("div");
        modal.classList.add("modal");
        // Friendly placeholder for default Admin post
        const placeholder = (d.name==="Admin" && d.year==="1st year" && d.branch==="CS") ? 
            "💬 Got an answer? Share it here and help a fellow student! 😊" : 
            "💬 Add a comment...";
        modal.innerHTML = `
            <div class="comments-modal">
                <span class="close-btn">&times;</span>
                <h3>Comments</h3>
                <div class="comments-container"></div>
                <div class="comment-input">
                    <textarea placeholder="${placeholder}"></textarea>
                    <button>Post</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);

        const closeBtn = modal.querySelector(".close-btn");
        closeBtn.onclick = ()=> modal.remove();

        const textarea = modal.querySelector("textarea");
        const commentBtn = modal.querySelector("button");
        renderComments(d, modal);

        commentBtn.addEventListener("click", ()=>{
            const txt = textarea.value.trim();
            if(!txt) return;
            if(!d.comments) d.comments=[];
            const newComment={text:txt, liked:false, replies:[]};
            d.comments.push(newComment);
            saveData();
            updateCommentCount();
            textarea.value="";
            renderComments(d, modal);
        });
    });

    post.addEventListener("click", e=>{
        if(e.target.classList.contains("comment-icon") || e.target.classList.contains("post-like")) return;
        const modal = document.createElement("div");
        modal.classList.add("modal");
        let modalImage = d.image ? `<img src="${d.image}" alt="Image">` : "";
        modal.innerHTML = `<div class="modal-content"><span class="close-btn">&times;</span><h2>${d.name} - ${d.year} (${d.branch})</h2><p>${d.doubt}</p>${modalImage}</div>`;
        document.body.appendChild(modal);
        modal.querySelector(".close-btn").onclick = ()=> modal.remove();
    });

    postsContainer.appendChild(post);
});
};
</script>
</body>
</html>
